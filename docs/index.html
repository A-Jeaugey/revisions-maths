<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Révisions Bac Maths spé Terminale — fiches, réflexes, formulaire, quiz, annales 2024-2025.">
  <title>RÉV · Bac Maths Spé</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800;9..144,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css?v=6">
  <link rel="stylesheet" href="css/views.css?v=6">
  <link rel="stylesheet" href="css/components.css?v=6">
  <link rel="stylesheet" href="css/print.css?v=6">
  <link rel="stylesheet" href="css/mobile.css?v=6">

  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>∫</text></svg>">
</head>
<body>

  <!-- Cursor follower -->
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <!-- Animated grid background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true">
    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>
    <div class="glow-blob glow-3"></div>
  </div>

  <!-- Top nav -->
  <nav class="topnav">
    <a href="#/" class="brand" data-link>
      <span class="brand-mark">∫</span>
      <span class="brand-text">RÉV<span class="brand-dot">.</span>maths</span>
    </a>
    <div class="nav-links">
      <a href="#/" data-link>Accueil</a>
      <a href="#/fiches" data-link>Fiches</a>
      <a href="#/reflexes" data-link>Réflexes</a>
      <a href="#/formulaire" data-link>Formulaire</a>
      <a href="#/catalogue" data-link>Catalogue</a>
      <a href="#/quiz" data-link>Quiz</a>
      <a href="#/annales" data-link>Annales</a>
    </div>
    <div class="nav-actions">
      <button class="btn-icon" id="searchBtn" title="Rechercher (⌘K)" aria-label="Rechercher">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="btn-icon" id="pomodoroBtn" title="Pomodoro" aria-label="Pomodoro">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
      </button>
      <button class="btn-icon" id="themeBtn" title="Thème" aria-label="Changer de thème">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/></svg>
      </button>
      <button class="btn-icon menu-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </nav>

  <!-- Main app container -->
  <main id="app" class="app">
    <div class="loader">
      <div class="loader-ring"></div>
      <p>Chargement…</p>
    </div>
  </main>

  <!-- Pomodoro panel -->
  <aside class="panel" id="pomodoroPanel" aria-hidden="true">
    <div class="panel-head">
      <h3>⏱ Pomodoro</h3>
      <button class="btn-icon" data-close-panel="pomodoroPanel" aria-label="Fermer">✕</button>
    </div>
    <div class="pomo-display">
      <div class="pomo-time" id="pomoTime">25:00</div>
      <div class="pomo-mode" id="pomoMode">FOCUS</div>
    </div>
    <div class="pomo-controls">
      <button class="btn-pill" id="pomoStart">Démarrer</button>
      <button class="btn-pill ghost" id="pomoReset">Reset</button>
    </div>
    <div class="pomo-presets">
      <button data-pomo="25">25 min</button>
      <button data-pomo="50">50 min</button>
      <button data-pomo="5">Pause 5 min</button>
    </div>
    <div class="pomo-stats">
      <div><span id="pomoCount">0</span> sessions aujourd'hui</div>
    </div>
  </aside>

  <!-- Search modal -->
  <div class="modal" id="searchModal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="searchModal"></div>
    <div class="modal-content search-modal">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher dans toutes les fiches…" autofocus>
        <kbd>ESC</kbd>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">Tape un mot-clé : « récurrence », « point fixe », « binomiale », « IPP »…</div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toasts" id="toasts"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
