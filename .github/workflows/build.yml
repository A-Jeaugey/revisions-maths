name: Build raw assets

on:
  push:
    branches: [main]
    paths:
      - 'docs/content/**'
      - 'docs/data/**'
      - 'scripts/build-raw.mjs'
      - 'package.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-raw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full ref so we can push back to it.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci || npm install --no-audit --no-fund

      - name: Build raw
        run: npm run build:raw

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/raw docs/llms.txt docs/sitemap.xml docs/robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild raw assets [skip ci]"
            git push
          fi
